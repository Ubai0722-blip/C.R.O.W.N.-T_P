active_audio_group: default
default_persona: Theresa
llm:
  api_base: https://token-plan-cn.xiaomimimo.com/v1
  api_key: YOUR_API_KEY
  light_model: mimo-v2.5
  max_tokens: 1024
  model: mimo-v2.5-pro
  temperature: 1
  timeout: 60
modules:
  emotion:
    enabled: true
  life_system:
    enabled: true
  psychology:
    shared: true
persona_bindings:
  scene_group: default
  tone_group: default
proactive:
  boot_cooldown_minutes: 5
  care_trigger_chance: 0.8
  interval_hours: 0.5
  mutter_enabled: true
  mutter_max_per_slot: 3
  quiet_hours_end: 0
  quiet_hours_start: 23
search:
  api_key: YOUR_TAVILY_KEY
  max_results: 3
tts:
  api_base: https://token-plan-cn.xiaomimimo.com/v1
  api_key: YOUR_API_KEY
  enabled: true
  model: mimo-v2.5-tts-voiceclone
  reference_audio: ''
vlm:
  api_base: https://token-plan-cn.xiaomimimo.com/v1
  api_key: YOUR_API_KEY
  max_tokens: 512
  model: mimo-v2.5-vl
  temperature: 0.3
  timeout: 30
active_tone_group: default
active_scene_group: default
